<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - Env Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/chat.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Header -->
  <header class="env-header">
    <a href="/" class="header-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span>Env Viewer</span>
    </a>
    <div class="header-actions">
      <a href="/env" class="btn btn-sm btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        View Env
      </a>
      <button class="btn btn-sm btn-secondary" id="btn-clear-chat" onclick="clearChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear
      </button>
    </div>
  </header>

  <!-- Chat Container -->
  <main class="chat-main">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>AI Assistant</h2>
        <p>Ask me about your environment variables, API keys, configuration, or any questions about your sandbox setup.</p>
        <div class="chat-suggestions">
          <button class="suggestion-chip" onclick="sendSuggestion('What are the most important environment variables I should check?')">What env vars should I check?</button>
          <button class="suggestion-chip" onclick="sendSuggestion('Explain the security implications of exposed API keys')">Security of exposed API keys</button>
          <button class="suggestion-chip" onclick="sendSuggestion('How should I organize my environment variables?')">How to organize env vars</button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <form class="chat-form" id="chat-form" onsubmit="handleSubmit(event)">
        <div class="chat-input-wrapper">
          <textarea
            class="chat-input"
            id="chat-input"
            placeholder="Ask about your environment..."
            rows="1"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button type="submit" class="btn-send" id="btn-send" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="chat-disclaimer">AI responses may be inaccurate. Verify important information.</p>
      </form>
    </div>
  </main>

  <script>
    let messages = [];
    let isStreaming = false;

    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');
    const chatWelcome = document.getElementById('chat-welcome');

    chatInput.addEventListener('input', () => {
      btnSend.disabled = !chatInput.value.trim() || isStreaming;
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!btnSend.disabled) handleSubmit(e);
      }
    }

    function sendSuggestion(text) {
      chatInput.value = text;
      btnSend.disabled = false;
      handleSubmit(new Event('submit'));
    }

    function handleSubmit(e) {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text || isStreaming) return;

      if (chatWelcome) chatWelcome.style.display = 'none';

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);

      chatInput.value = '';
      chatInput.style.height = 'auto';
      btnSend.disabled = true;

      streamResponse();
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `chat-message chat-message-${role}`;
      div.innerHTML = `
        <div class="message-avatar">
          ${role === 'user'
            ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
            : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
          }
        </div>
        <div class="message-content">
          <div class="message-role">${role === 'user' ? 'You' : 'Assistant'}</div>
          <div class="message-text">${escapeHtml(content)}</div>
        </div>
      `;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    function appendAssistantStream() {
      const div = document.createElement('div');
      div.className = 'chat-message chat-message-assistant';
      div.id = 'streaming-message';
      div.innerHTML = `
        <div class="message-avatar message-avatar-assistant">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="message-content">
          <div class="message-role">Assistant</div>
          <div class="message-text" id="streaming-text"><span class="typing-cursor"></span></div>
        </div>
      `;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    async function streamResponse() {
      isStreaming = true;
      btnSend.disabled = true;

      const streamDiv = appendAssistantStream();
      const textEl = document.getElementById('streaming-text');
      let fullText = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        if (!res.ok) {
          const err = await res.json();
          textEl.textContent = 'Error: ' + (err.error || 'Failed to get response');
          isStreaming = false;
          btnSend.disabled = !chatInput.value.trim();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === 'text') {
                fullText += data.text;
                textEl.innerHTML = formatMarkdown(fullText) + '<span class="typing-cursor"></span>';
                chatMessages.scrollTop = chatMessages.scrollHeight;
              } else if (data.type === 'error') {
                textEl.textContent = 'Error: ' + data.error;
              } else if (data.type === 'done') {
                textEl.innerHTML = formatMarkdown(fullText);
                messages.push({ role: 'assistant', content: fullText });
              }
            } catch {}
          }
        }
      } catch (err) {
        textEl.textContent = 'Network error: ' + err.message;
      }

      isStreaming = false;
      btnSend.disabled = !chatInput.value.trim();
      chatInput.focus();
    }

    function formatMarkdown(text) {
      let html = escapeHtml(text);
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function clearChat() {
      messages = [];
      chatMessages.innerHTML = '';
      chatMessages.innerHTML = `
        <div class="chat-welcome" id="chat-welcome">
          <div class="chat-welcome-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2>AI Assistant</h2>
          <p>Ask me about your environment variables, API keys, configuration, or any questions about your sandbox setup.</p>
          <div class="chat-suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('What are the most important environment variables I should check?')">What env vars should I check?</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Explain the security implications of exposed API keys')">Security of exposed API keys</button>
            <button class="suggestion-chip" onclick="sendSuggestion('How should I organize my environment variables?')">How to organize env vars</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
