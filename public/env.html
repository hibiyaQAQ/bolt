<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View all environment variables in the current sandbox, including API keys and secrets">
  <title>Environment Variables - Sandbox Inspector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Header -->
  <header class="env-header" id="env-header">
    <a href="/" class="header-logo" id="header-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span>Env Viewer</span>
    </a>
    <div class="header-actions">
      <div class="env-stats" id="env-stats">
        <div class="stat">
          <span class="stat-value" id="stat-total">—</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-secrets">—</span>
          <span class="stat-label">Secrets</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-visible">—</span>
          <span class="stat-label">Showing</span>
        </div>
      </div>
      <a href="/chat" class="btn btn-sm btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        AI Chat
      </a>
      <button class="btn btn-sm btn-secondary" id="btn-copy-all" onclick="copyAllEnv()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy All
      </button>
      <button class="btn btn-sm btn-secondary" id="btn-refresh" onclick="loadEnv()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Search & Filters -->
  <div class="search-bar" id="search-bar">
    <div class="search-input-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Search variables by key or value..."
        oninput="filterEnv()"
        autocomplete="off"
      >
      <kbd class="search-kbd" id="search-kbd">Ctrl+K</kbd>
    </div>
    <div class="filter-chips" id="filter-chips">
      <button class="chip chip-active" id="chip-all" onclick="setFilter('all')">All</button>
      <button class="chip" id="chip-secrets" onclick="setFilter('secrets')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Secrets
      </button>
      <button class="chip" id="chip-paths" onclick="setFilter('paths')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Paths
      </button>
      <button class="chip" id="chip-config" onclick="setFilter('config')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Config
      </button>
    </div>
  </div>

  <!-- Environment Variables List -->
  <main class="env-container" id="env-container">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>Loading environment variables...</p>
    </div>
    <div class="env-list" id="env-list"></div>
    <div class="env-empty" id="env-empty" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p>No environment variables match your search</p>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toast-text">Copied!</span>
  </div>

  <script>
    // State
    let allEnvVars = {};
    let currentFilter = 'all';

    // Secret patterns
    const SECRET_PATTERNS = [
      /key/i, /secret/i, /token/i, /password/i, /passwd/i,
      /credential/i, /auth/i, /api/i, /private/i, /access/i,
      /session/i, /jwt/i, /bearer/i, /oauth/i, /encrypt/i
    ];

    const PATH_PATTERNS = [/path/i, /dir/i, /home/i, /root/i, /pwd/i, /cwd/i, /folder/i];

    const CONFIG_PATTERNS = [
      /node/i, /npm/i, /env/i, /lang/i, /shell/i, /term/i,
      /editor/i, /user/i, /host/i, /port/i, /display/i, /version/i
    ];

    function isSecret(key) {
      return SECRET_PATTERNS.some(p => p.test(key));
    }

    function isPath(key) {
      return PATH_PATTERNS.some(p => p.test(key));
    }

    function isConfig(key) {
      return CONFIG_PATTERNS.some(p => p.test(key));
    }

    function getCategory(key) {
      if (isSecret(key)) return 'secret';
      if (isPath(key)) return 'path';
      if (isConfig(key)) return 'config';
      return 'other';
    }

    function getCategoryBadge(category) {
      const badges = {
        secret: '<span class="var-badge var-badge-secret">Secret</span>',
        path: '<span class="var-badge var-badge-path">Path</span>',
        config: '<span class="var-badge var-badge-config">Config</span>',
        other: ''
      };
      return badges[category] || '';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderEnvVars(vars) {
      const list = document.getElementById('env-list');
      const empty = document.getElementById('env-empty');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();

      let entries = Object.entries(vars);

      // Apply category filter
      if (currentFilter !== 'all') {
        entries = entries.filter(([key]) => {
          const cat = getCategory(key);
          if (currentFilter === 'secrets') return cat === 'secret';
          if (currentFilter === 'paths') return cat === 'path';
          if (currentFilter === 'config') return cat === 'config';
          return true;
        });
      }

      // Apply search filter
      if (searchTerm) {
        entries = entries.filter(([key, val]) =>
          key.toLowerCase().includes(searchTerm) ||
          val.toLowerCase().includes(searchTerm)
        );
      }

      // Update stats
      document.getElementById('stat-visible').textContent = entries.length;

      if (entries.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';

      list.innerHTML = entries.map(([key, value], index) => {
        const category = getCategory(key);
        const isKeyHighlighted = key.toUpperCase().includes('ANTHROPIC') || 
                                  key.toUpperCase().includes('API_KEY') || 
                                  key.toUpperCase().includes('SECRET');
        const highlightClass = isKeyHighlighted ? 'env-item-highlight' : '';

        return `
          <div class="env-item ${highlightClass}" style="animation-delay: ${index * 0.02}s" id="env-item-${index}">
            <div class="env-item-header">
              <div class="env-key-group">
                <span class="env-key">${escapeHtml(key)}</span>
                ${getCategoryBadge(category)}
                ${isKeyHighlighted ? '<span class="var-badge var-badge-important">⚠️ Important</span>' : ''}
              </div>
              <button class="btn-icon" onclick="copyValue('${escapeHtml(key)}', '${escapeHtml(value).replace(/'/g, "\\'")}')" title="Copy value" id="btn-copy-${index}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
            </div>
            <div class="env-value-wrapper">
              <code class="env-value">${escapeHtml(value) || '<span class="env-empty-value">(empty)</span>'}</code>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterEnv() {
      renderEnvVars(allEnvVars);
    }

    function setFilter(filter) {
      currentFilter = filter;
      
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-active'));
      document.getElementById(`chip-${filter}`).classList.add('chip-active');
      
      filterEnv();
    }

    function copyValue(key, value) {
      navigator.clipboard.writeText(value).then(() => {
        showToast(`Copied ${key}`);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = value;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(`Copied ${key}`);
      });
    }

    function copyAllEnv() {
      const text = Object.entries(allEnvVars)
        .map(([k, v]) => `${k}=${v}`)
        .join('\n');
      
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied all environment variables');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toast-text');
      toastText.textContent = message;
      toast.classList.add('toast-visible');
      setTimeout(() => toast.classList.remove('toast-visible'), 2000);
    }

    async function loadEnv() {
      const loading = document.getElementById('loading');
      const list = document.getElementById('env-list');
      
      loading.style.display = 'flex';
      list.innerHTML = '';

      try {
        const res = await fetch('/api/env');
        const data = await res.json();
        
        allEnvVars = data.variables;
        
        // Update stats
        document.getElementById('stat-total').textContent = data.total;
        const secretCount = Object.keys(allEnvVars).filter(k => isSecret(k)).length;
        document.getElementById('stat-secrets').textContent = secretCount;
        document.getElementById('stat-visible').textContent = data.total;
        
        loading.style.display = 'none';
        renderEnvVars(allEnvVars);
      } catch (err) {
        loading.innerHTML = `
          <div class="error-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <p>Failed to load environment variables</p>
            <button class="btn btn-primary btn-sm" onclick="loadEnv()">Retry</button>
          </div>
        `;
      }
    }

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
      if (e.key === 'Escape') {
        document.getElementById('search-input').blur();
      }
    });

    // Init
    loadEnv();
  </script>
</body>
</html>
